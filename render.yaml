services:
  - type: web
    name: supercompare-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    disk:
      name: supercompare-data
      mountPath: /data
      sizeGB: 1
